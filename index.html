<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=1300">
    <title>ДОСКА ПОЧЁТА | MARKIS</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            background-color: #0d0d12;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1 {
            font-size: 3rem; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 10px #b026ff, 0 0 20px #b026ff;
            margin-bottom: 50px; text-align: center;
            transition: opacity 0.4s ease;
        }

        .board-container {
            display: flex; gap: 25px; 
            width: 1300px; 
            justify-content: center;
        }

        body.focus-mode h1 { opacity: 0; pointer-events: none; height: 0; margin: 0; }

        .column {
            flex: 1; min-width: 350px; border-radius: 15px; padding: 25px;
            background: linear-gradient(145deg, #1a1a24, #12121a);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); border: 1px solid #2a2a35;
            display: flex; flex-direction: column;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        /* СОСТОЯНИЕ РАЗВЕРНУТОЙ КОЛОНКИ */
        .column.expanded {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100% !important; height: 100% !important;
            z-index: 9999;
            cursor: default;
            overflow-y: auto;
            border-radius: 0;
            padding: 40px 20px;
            border: none;
            box-shadow: none;
            background: #0d0d12; /* Чистый фон в режиме фокуса */
        }

        .board-container.has-expanded .column:not(.expanded) {
            opacity: 0; pointer-events: none;
        }

        .close-btn {
            position: fixed; top: 20px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #ff26a5; border: none;
            color: black; font-size: 30px; font-weight: bold;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10001;
            box-shadow: 0 0 20px #ff26a5;
        }
        .column.expanded .close-btn { display: flex; }

        /* ЦВЕТА (ВОЗВРАЩЕНО И УЛУЧШЕНО) */
        .col-legends { border: 2px solid #ff26a5; box-shadow: 0 0 15px rgba(255, 38, 165, 0.2); }
        .col-sheikhs { border: 2px solid #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .col-fame { border: 2px solid #ff5e00; box-shadow: 0 0 15px rgba(255, 94, 0, 0.2); }

        .column h2 {
            text-align: center; font-size: 2.2rem; margin-top: 0; padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase;
        }
        .col-legends h2 { color: #ffb3e1; text-shadow: 0 0 10px #ff26a5; }
        .col-sheikhs h2 { color: #ffeea8; text-shadow: 0 0 10px #ffcc00; }
        .col-fame h2 { color: #ffc4a3; text-shadow: 0 0 10px #ff5e00; }

        .card {
            background: #15151c; border-radius: 10px; padding: 20px; margin-bottom: 15px;
            border: 1px solid #222; position: relative; padding-left: 35px;
        }
        
        .card::before {
            content: ''; position: absolute; left: 12px; top: 20%; bottom: 20%;
            width: 4px; border-radius: 4px;
        }
        .col-legends .card::before { background: #ff26a5; box-shadow: 0 0 8px #ff26a5; }
        .col-sheikhs .card::before { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .col-fame .card::before { background: #ff5e00; box-shadow: 0 0 8px #ff5e00; }

        .card-title { font-size: 1rem; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .col-legends .card-title { color: #ff26a5; }
        .col-sheikhs .card-title { color: #ffcc00; }
        .col-fame .card-title { color: #ff5e00; }

        .card-value { font-size: 1.5rem; font-weight: bold; }
        .col-legends .card-value { color: #ffb3e1; text-shadow: 0 0 10px #ff26a5; }
        .col-sheikhs .card-value { color: #ffeea8; text-shadow: 0 0 10px #ffcc00; }
        .col-fame .card-value { color: #ffc4a3; text-shadow: 0 0 10px #ff5e00; }

        .date-stamp { margin-top: 40px; color: #444; font-size: 1.1rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>ДОСКА ПОЧЁТА КАНАЛА MARKIS</h1>

    <div class="board-container" id="main-container">
        <div class="column col-legends" onclick="expandColumn(this)">
            <button class="close-btn" onclick="closeColumn(event, this)">✕</button>
            <h2>ЛЕГЕНДЫ ЧАТА 💬</h2>
            <div id="legends-col"></div>
        </div>

        <div class="column col-sheikhs" onclick="expandColumn(this)">
            <button class="close-btn" onclick="closeColumn(event, this)">✕</button>
            <h2>ШЕЙХИ КАНАЛА $</h2>
            <div id="sheikhs-col"></div>
        </div>

        <div class="column col-fame" onclick="expandColumn(this)">
            <button class="close-btn" onclick="closeColumn(event, this)">✕</button>
            <h2>ЗАЛ СЛАВЫ 🏆</h2>
            <div id="fame-col"></div>
        </div>
    </div>

    <div class="date-stamp" id="date-stamp"></div>

    <script src="data.js"></script>

    <script>
        const viewport = document.getElementById('viewport-meta');

        function renderCards(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container || !items) return;
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-title">${item.title}</div><div class="card-value">${item.value}</div>`;
                container.appendChild(card);
            });
        }

        function expandColumn(col) {
            if (col.classList.contains('expanded')) return;
            
            // На телефоне переключаем в нативный мобильный режим
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0');
            
            const container = document.getElementById('main-container');
            container.classList.add('has-expanded');
            col.classList.add('expanded');
            document.body.classList.add('focus-mode');
            
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        function closeColumn(event, btn) {
            event.stopPropagation();
            
            // Возвращаем режим широкого плаката
            viewport.setAttribute('content', 'width=1300');
            
            const col = btn.parentElement;
            const container = document.getElementById('main-container');
            
            container.classList.remove('has-expanded');
            col.classList.remove('expanded');
            document.body.classList.remove('focus-mode');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof boardData !== 'undefined') {
                renderCards('legends-col', boardData.legends);
                renderCards('sheikhs-col', boardData.sheikhs);
                renderCards('fame-col', boardData.hallOfFame);
                document.getElementById('date-stamp').innerText = boardData.dateStamp;
            }
        });
    </script>
</body>
</html>
